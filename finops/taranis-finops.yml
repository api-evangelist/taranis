specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Taranis
providerId: taranis
created: '2026-06-20'
modified: '2026-06-20'
reconciled: false
tags:
- Agriculture
- AgTech
- Crop Intelligence
- Computer Vision
- Aerial Scouting
- Precision Agriculture
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Taranis spend. Taranis is a contract-based, per-acre SaaS
  crop-intelligence service rather than a usage-metered API, so cost management
  centers on acreage under subscription, scouting cadence, and the value of
  yield and input decisions the insights enable - not on per-token or
  per-request billing. Spend is committed up front through advisor, retailer,
  grower, or partner agreements.
notes: >-
  No public API or usage-based metering exists; FOCUS meters below model the
  per-acre subscription economics and are illustrative, not reconciled against
  published billing exports. Verify with Taranis sales/billing during
  reconciliation.
sources:
- https://www.taranis.com/
- https://go.taranis.com/acreforward/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Taranis
serviceCategory: Analytics
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
meters:
- name: subscribed_acres
  description: Acres under AcreForward subscription, the primary billing driver, typically priced per acre per season.
  unit: acres
  aggregation: sum
  dimensions:
  - account
  - program
- name: scouting_passes
  description: Aerial capture and analysis passes delivered against contracted acreage.
  unit: passes
  aggregation: sum
  dimensions:
  - account
  - field
- name: partner_program
  description: Co-branded or channel partner program commitments and volume agreements.
  unit: contracts
  aggregation: sum
  dimensions:
  - account
  - partner
principles:
- name: Visibility
  description: Track acres under subscription and scouting passes delivered against contracted program scope.
- name: Allocation
  description: Allocate per-acre cost to fields, growers, and programs to map spend to the operations it serves.
- name: Optimization
  description: Right-size subscribed acreage and scouting cadence to fields where leaf-level insight changes input or yield decisions.
- name: Accountability
  description: Assign program owners and review per-acre spend against realized yield-impact outcomes each season.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
