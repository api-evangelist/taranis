aid: taranis
url: https://raw.githubusercontent.com/api-evangelist/taranis/refs/heads/main/apis.yml
name: Taranis
kind: company
description: Taranis is an AI-powered crop intelligence company that delivers full-service,
  leaf-level aerial scouting for agricultural advisors, retailers, and growers. Its
  AcreForward platform captures submillimeter drone and satellite imagery and applies
  computer vision and generative AI (Ag Assistant) to detect weeds, pests, disease,
  nutrient deficiencies, and stand counts, turning insights into measurable yield
  outcomes. Taranis is delivered as a closed SaaS platform (web dashboard and mobile
  apps); no public or partner developer API is documented as of this writing.
