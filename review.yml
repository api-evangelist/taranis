  - url: https://go.taranis.com/ag-assistant/
    type: Documentation
    note: Ag Assistant generative AI agronomy engine; in-platform feature, no API.
  - url: https://go.taranis.com/ag-partners/
    type: Documentation
    note: Channel partner program; commercial integrations, no self-serve partner API.
  - url: https://knowledge.taranis.ag/portal/en/kb
    type: Documentation
