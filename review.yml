  - url: https://www.taranis.com/newsroom/ag-assistant/
    type: Documentation
    note: Ag Assistant launch (July 2024); ingests machinery/weather data but no public API.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    Catalog records four product surfaces (Crop Intelligence, Imagery and
    Insights, Ag Assistant, Platform Integrations) as platform features rather
    than APIs. The OpenAPI document uses paths: {} with a description stating no
    public API is documented. plans, rate-limits, and finops artifacts are
    marked reconciled: false with notes that Taranis is a contract-based,
    per-acre SaaS service, not a metered public API. No endpoints were
    fabricated.
